name: Sync when submodule updates

on:
  repository_dispatch:
    types: [submodule-updated]

concurrency:
  group: sync-submodules-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger info
        run: |
          echo "From repo: ${{ github.event.client_payload.repo }}"
          echo "Commit: ${{ github.event.client_payload.sha }}"

      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync submodules
        run: |
          set -euo pipefail

          git submodule sync --recursive
          git submodule update --init --recursive

          bump() {
            local dir="$1"
            if [ ! -d "$dir" ]; then
              echo "::warning::Missing: $dir"
              return
            fi
            echo "Updating $dir"
            git -C "$dir" fetch origin main
            git -C "$dir" checkout -B main origin/main
          }

          # 只更新被触发的子仓库
          CHANGED="${{ github.event.client_payload.repo }}"

          if [[ "$CHANGED" == *"algorithm_application_doc"* ]]; then
            bump rdk_s100_algorithm_application_doc
          fi

          if [[ "$CHANGED" == *"robot_development_doc"* ]]; then
            bump rdk_s100_robot_development_doc
          fi

          # 嵌套 submodule
          NESTED="rdk_s100_algorithm_application_doc/rdk_s100_robot_development_doc"
          if [ -d "$NESTED" ]; then
            bump "$NESTED"
          fi

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: sync submodules (GitHub App)"
          git push origin HEAD:main