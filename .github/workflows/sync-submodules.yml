# 主仓库：.github/workflows/sync-on-subrepo-update.yml
name: Sync when submodule updates

on:
  workflow_run:
    workflows: ["CI"]  # 必须与子仓库的 workflow 名称完全一致
    repositories:
      - "liqinglian01/rdk_s100_algorithm_application_doc"  # 子仓库1
      - "liqinglian01/rdk_s100_robot_development_doc"      # 子仓库2（如需）
    types:
      - completed

concurrency:
  group: sync-submodules-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    # 仅在子仓库的 CI 成功时执行
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump submodules to origin/main
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive

          bump() {
            local dir="$1"
            if [ ! -e "$dir" ]; then
              echo "::warning::Path missing, skip: $dir"
              return 0
            fi
            git -C "$dir" fetch origin main
            git -C "$dir" checkout -B main origin/main
          }

          bump rdk_s100_algorithm_application_doc
          bump rdk_s100_robot_development_doc

          NESTED="rdk_s100_algorithm_application_doc/rdk_s100_robot_development_doc"
          if [ -e "$NESTED" ]; then
            git -C "$NESTED" fetch origin main
            git -C "$NESTED" checkout -B main origin/main
          fi

          git add rdk_s100_algorithm_application_doc rdk_s100_robot_development_doc

          if git diff --cached --quiet; then
            echo "::notice::No submodule pointer changes — already up to date."
            exit 0
          fi

          git commit -m "chore: sync submodules to latest main (triggered by subrepo update)"
          git push origin HEAD:main